name: Claude AI Documentation Generator

on:
  workflow_dispatch:
    inputs:
      target_path:
        description: 'Path to generate docs for (e.g., src/features/leads)'
        required: false
        default: 'src'

jobs:
  generate-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate documentation with Claude
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TARGET_PATH: ${{ github.event.inputs.target_path || 'src' }}
        run: |
          touch code_bundle.txt
          FILE_COUNT=0
          find "$TARGET_PATH" -type f \( -name "*.ts" -o -name "*.tsx" \) | head -20 | while read -r file; do
            if [ -f "$file" ]; then
              echo "### File: $file" >> code_bundle.txt
              echo '```typescript' >> code_bundle.txt
              head -n 200 "$file" >> code_bundle.txt
              echo '```' >> code_bundle.txt
            fi
          done

          CODE_CONTENT=$(cat code_bundle.txt | head -c 50000)

          PROMPT="Generate comprehensive technical documentation for this codebase. Include:

          1. **Overview** - High-level architecture and purpose
          2. **Components** - Key components/modules with their responsibilities
          3. **API Reference** - Important functions, hooks, types
          4. **Data Flow** - How data moves through the system
          5. **Usage Examples** - Code examples for common tasks

          Format in Markdown with clear sections and code examples.

          $CODE_CONTENT"

          jq -n \
            --arg prompt "$PROMPT" \
            --arg system "You are a technical documentation expert. Create clear, comprehensive documentation." \
            '{
              prompt: $prompt,
              model: "claude-sonnet-4-5",
              system_prompt: $system,
              max_tokens: 16384,
              temperature: 0.2,
              feature: "ci-documentation"
            }' > doc_prompt.json

          DOC_RESPONSE=$(curl -sf -X POST \
            "$SUPABASE_URL/functions/v1/ai-claude-processor" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -d @doc_prompt.json) || {
              echo "Edge function call failed"
              exit 1
            }

          mkdir -p docs
          echo "$DOC_RESPONSE" | jq -r '.response // "Documentation generation failed"' > docs/DOCUMENTATION.md

      - name: Create documentation PR
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "📝 Generate documentation for ${{ github.event.inputs.target_path }}"
          title: "📝 Documentation Update - ${{ github.event.inputs.target_path }}"
          body: |
            ## 📝 Auto-Generated Documentation
            
            Claude AI has generated documentation for: `${{ github.event.inputs.target_path }}`
            
            **Review the generated documentation and merge if accurate.**
          branch: docs/auto-generated-${{ github.run_number }}
