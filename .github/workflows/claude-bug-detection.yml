name: Claude AI Bug Detection

on:
  pull_request:
    types: [opened, synchronize, reopened]
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  detect-bugs:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Collect code for analysis
        run: |
          CRITICAL_FILES=(
            "src/features/leads"
            "src/features/jobs"
            "src/features/sales"
            "supabase/functions"
          )
          
          touch analysis_bundle.txt
          for area in "${CRITICAL_FILES[@]}"; do
            if [ -d "$area" ]; then
              echo "### Analyzing: $area" >> analysis_bundle.txt
              find "$area" -type f \( -name "*.ts" -o -name "*.tsx" \) | head -30 | while read -r file; do
                echo "#### File: $file" >> analysis_bundle.txt
                echo '```typescript' >> analysis_bundle.txt
                head -n 200 "$file" >> analysis_bundle.txt
                echo '```' >> analysis_bundle.txt
              done
            fi
          done

      - name: Analyze code for bugs with Claude
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          CODE_CONTENT=$(cat analysis_bundle.txt | head -c 50000)
          
          PROMPT="Analyze this code for potential bugs and issues. Focus on:

          1. **Runtime Errors** - Null pointer exceptions, undefined references, type mismatches
          2. **Logic Errors** - Incorrect conditions, off-by-one errors, race conditions
          3. **Data Issues** - SQL injection, data validation gaps, incorrect queries
          4. **Security Vulnerabilities** - Authentication bypass, data exposure

          For each issue found:
          - **Severity**: Critical/High/Medium/Low
          - **Location**: File and line/function
          - **Issue**: Clear description
          - **Fix**: Specific code fix

          Only report genuine bugs, not style preferences.

          $CODE_CONTENT"

          jq -n \
            --arg prompt "$PROMPT" \
            --arg system "You are an expert bug hunter. Find real bugs that could cause production issues." \
            '{
              prompt: $prompt,
              model: "claude-sonnet-4-5",
              system_prompt: $system,
              max_tokens: 8192,
              temperature: 0.1,
              feature: "ci-bug-detection"
            }' > bug_prompt.json

          BUG_RESPONSE=$(curl -sf -X POST \
            "$SUPABASE_URL/functions/v1/ai-claude-processor" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -d @bug_prompt.json) || {
              echo "Edge function call failed"
              echo "No bugs detected (analysis unavailable)" > bug_report.md
              exit 0
            }

          echo "$BUG_RESPONSE" | jq -r '.response // "No bugs detected"' > bug_report.md

      - name: Parse bug severity
        id: severity
        run: |
          CRITICAL_COUNT=$(grep -ci "Critical" bug_report.md || echo "0")
          HIGH_COUNT=$(grep -ci "High" bug_report.md || echo "0")
          
          echo "critical=$CRITICAL_COUNT" >> $GITHUB_OUTPUT
          echo "high=$HIGH_COUNT" >> $GITHUB_OUTPUT
          
          if [ "$CRITICAL_COUNT" -gt 0 ] || [ "$HIGH_COUNT" -gt 0 ]; then
            echo "issues_found=true" >> $GITHUB_OUTPUT
          else
            echo "issues_found=false" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub issues for critical bugs
        if: steps.severity.outputs.issues_found == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const bugReport = fs.readFileSync('bug_report.md', 'utf8');
            
            const existingIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'bug,claude-ai-detected'
            });
            
            const today = new Date().toISOString().split('T')[0];
            const issueTitle = `🐛 Claude AI Bug Detection Report - ${today}`;
            
            const alreadyReported = existingIssues.data.some(issue => 
              issue.title.includes(today)
            );
            
            if (!alreadyReported) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: issueTitle,
                body: `## 🐛 Automated Bug Detection Report\n\n${bugReport.substring(0, 60000)}\n\n---\n*Detected by Claude AI*`,
                labels: ['bug', 'claude-ai-detected', 'needs-triage']
              });
            }

      - name: Comment on PR
        if: github.event_name == 'pull_request' && steps.severity.outputs.issues_found == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const bugReport = fs.readFileSync('bug_report.md', 'utf8');
            
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ⚠️ Claude AI Bug Detection\n\n${bugReport.substring(0, 60000)}\n\n---\n*Powered by Claude AI*`
            });
