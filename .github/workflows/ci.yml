name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'public/**'
      - '.github/ISSUE_TEMPLATE/**'
  pull_request:
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'public/**'
      - '.github/ISSUE_TEMPLATE/**'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --no-audit --no-fund
      - run: npm run typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --no-audit --no-fund
      - run: npm run lint

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --no-audit --no-fund
      - run: npm run test:unit
        env:
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: test-anon-key

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --no-audit --no-fund
      - run: npm run build

  edge-functions-check:
    name: Deno • Changed Edge Functions
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: Find changed edge function files
        id: changed
        uses: tj-actions/changed-files@v45
        with:
          files: |
            supabase/functions/**/*.ts

      - name: Deno type-check changed edge functions (PR / branch push)
        if: github.ref != 'refs/heads/main' && steps.changed.outputs.any_changed == 'true'
        run: |
          set -e
          # Only check index.ts entrypoints — checking a shared file pulls in its
          # dependents anyway via deno's module graph.
          files=()
          for f in ${{ steps.changed.outputs.all_changed_files }}; do
            case "$f" in
              supabase/functions/_shared/*) ;;  # skip; covered transitively
              supabase/functions/*/index.ts) files+=("$f") ;;
            esac
          done
          if [ ${#files[@]} -eq 0 ]; then
            echo "No changed edge function entrypoints to check."
            exit 0
          fi
          echo "Checking: ${files[@]}"
          deno check --no-lock "${files[@]}"
        shell: bash

      - name: Deno type-check ALL edge functions (main only, non-blocking)
        if: github.ref == 'refs/heads/main'
        continue-on-error: true
        run: |
          set +e
          shopt -s globstar nullglob
          files=(supabase/functions/**/index.ts)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No edge functions found"
            exit 0
          fi
          deno check --no-lock "${files[@]}"
          echo "::notice::Full edge-function typecheck completed (non-blocking on main)."
        shell: bash

      - name: No changed edge functions
        if: github.ref != 'refs/heads/main' && steps.changed.outputs.any_changed != 'true'
        run: echo "No changed edge functions to check"
