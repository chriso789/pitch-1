  <body>
    <p>Connecting QuickBooks…</p>
    <script>
      (function () {
        var edgeCallback = "https://alxelfrbjzkmtnsulcei.supabase.co/functions/v1/qbo-oauth-connect/callback";
        var params = window.location.search || "";
        if (!params || params === "?") {
          window.location.replace("/settings/integrations?provider=qbo&status=invalid_state&reason=missing_callback_params");
          return;
        }
        window.location.replace(edgeCallback + params);
      })();
    </script>
  </body>
